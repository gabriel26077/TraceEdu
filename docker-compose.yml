version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: traceedu-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=traceedu_user
      - POSTGRES_PASSWORD=traceedu_pass
      - POSTGRES_DB=traceedu_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traceedu-backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://traceedu_user:traceedu_pass@db:5432/traceedu_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traceedu-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - ENV=production

volumes:
  postgres_data:
